<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Design Reference</title>
<style>
  :root {
    --bg: #fafaf7;
    --fg: #1a1a1a;
    --muted: #8a8a85;
    --border: #e5e5e0;
    --accent: #1a1a1a;
    --mono: "SF Mono", ui-monospace, "JetBrains Mono", Menlo, Consolas, monospace;
    --serif: "Iowan Old Style", "Palatino Linotype", "URW Palladio L", Palatino, serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--fg);
    font: 15px/1.6 var(--serif);
    padding: 56px 64px;
  }
  .container { max-width: 960px; margin: 0 auto; }
  header {
    border-bottom: 1px solid var(--border);
    padding-bottom: 32px;
    margin-bottom: 48px;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 24px;
  }
  .eyebrow {
    font: 10px/1 var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 14px;
  }
  h1 { font-size: 44px; font-weight: normal; letter-spacing: -0.02em; line-height: 1; }
  .status {
    font: 10px/1 var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3a9a3a; display: inline-block;
  }
  .parse-error {
    border: 1px solid #d4a017;
    background: #fff9e6;
    color: #7a5a00;
    font: 12px/1.5 var(--mono);
    padding: 12px 16px;
    border-radius: 3px;
    margin-bottom: 32px;
  }
  section { margin-bottom: 56px; }
  section h2 {
    font: 11px/1 var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
  }
  section h2 .idx {
    color: var(--border);
  }
  .prose p { margin-bottom: 10px; }
  .prose strong { font-weight: 600; }
  .prose em { font-style: italic; }
  .prose ul { padding-left: 18px; margin-bottom: 10px; }
  .prose li { margin-bottom: 4px; }
  .prose code {
    font-family: var(--mono);
    font-size: 0.86em;
    background: rgba(0,0,0,0.05);
    padding: 2px 6px;
    border-radius: 2px;
  }
  .todo {
    color: var(--muted);
    font-style: italic;
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.06em;
    padding: 14px 18px;
    border: 1px dashed var(--border);
    border-radius: 3px;
  }
  .swatches {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
    margin-top: 20px;
  }
  .swatch {
    aspect-ratio: 4/3;
    border-radius: 3px;
    border: 1px solid rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: flex-end;
    padding: 10px;
    position: relative;
    overflow: hidden;
    gap: 4px;
  }
  .swatch-label {
    font-family: var(--mono);
    font-size: 11px;
    background: rgba(255,255,255,0.92);
    color: #000;
    padding: 3px 7px;
    border-radius: 2px;
    letter-spacing: 0.02em;
    backdrop-filter: blur(4px);
  }
  .swatch-value {
    font-family: var(--mono);
    font-size: 10px;
    background: rgba(255,255,255,0.82);
    color: #333;
    padding: 2px 6px;
    border-radius: 2px;
    letter-spacing: 0.04em;
  }
  .font-specimen {
    margin-top: 20px;
    padding: 28px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: #fff;
  }
  .font-name {
    font: 10px/1 var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
  }
  .font-sample-lg {
    line-height: 1.05;
    margin-bottom: 10px;
    word-break: break-word;
  }
  .font-sample-md { color: var(--muted); }
  .font-alpha { font-size: 15px; color: var(--muted); margin-top: 8px; font-feature-settings: "tnum"; }
  .scale-bars {
    margin-top: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .scale-bar {
    display: grid;
    grid-template-columns: 80px 1fr 80px;
    align-items: center;
    gap: 12px;
    font-family: var(--mono);
    font-size: 11px;
  }
  .scale-bar-name { color: var(--fg); letter-spacing: 0.04em; }
  .scale-bar-fill {
    height: 14px;
    background: var(--fg);
    border-radius: 2px;
  }
  .scale-bar-value { color: var(--muted); text-align: right; }
  .shape-row {
    display: flex;
    flex-wrap: wrap;
    gap: 18px;
    margin-top: 20px;
  }
  .shape-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .shape-box {
    width: 72px;
    height: 72px;
    background: var(--fg);
  }
  .shape-meta {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.04em;
  }
  .shape-meta strong { color: var(--fg); font-weight: 500; display: block; }
  .component-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-top: 20px;
  }
  .component-card {
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 20px;
    background: #fff;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .component-name {
    font: 10px/1 var(--mono);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .component-preview {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 40px;
    align-self: flex-start;
  }
  .lede {
    margin-bottom: 20px;
    padding: 18px 20px;
    border-left: 3px solid var(--fg);
    background: #fff;
  }
  .lede-name {
    font: 11px/1 var(--mono);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fg);
    margin-bottom: 6px;
  }
  .lede-desc { color: var(--muted); font-size: 14px; }
  .feel-divider {
    margin: 64px 0 40px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .feel-divider .eyebrow { margin-bottom: 0; }
  .feel-divider h2 {
    font-size: 28px;
    font-weight: normal;
    letter-spacing: -0.01em;
  }
  .empty {
    padding: 48px;
    text-align: center;
    color: var(--muted);
    border: 1px dashed var(--border);
    border-radius: 3px;
    font-style: italic;
  }
  footer {
    margin-top: 80px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font: 10px/1.4 var(--mono);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="eyebrow">Design Reference</div>
      <h1>Design Language</h1>
    </div>
    <div class="status" id="status"><span class="dot"></span>Live</div>
  </header>
  <main id="content"></main>
  <footer>
    <span>Generated from DESIGN.md + FEEL.md</span>
    <span id="updated"></span>
  </footer>
</div>
<script>
(function () {
  var projectId = location.pathname.split('/')[2]
  var contentEl = document.getElementById('content')
  var updatedEl = document.getElementById('updated')

  var CANONICAL_ORDER = [
    'overview', 'colors', 'typography', 'layout',
    'elevation & depth', 'shapes', 'components', "do's and don'ts"
  ]

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]
    })
  }

  function normalizeTitle(t) {
    var s = String(t).toLowerCase().trim()
    if (s === 'brand & style') return 'overview'
    if (s === 'color') return 'colors'
    if (s === 'layout & spacing') return 'layout'
    if (s === 'elevation') return 'elevation & depth'
    return s
  }

  function isTodo(body) {
    if (!body) return true
    var lines = body.split('\n').map(function (l) { return l.trim() }).filter(Boolean)
    if (lines.length === 0) return true
    return lines.every(function (l) { return /^TODO\b/i.test(l) || /^TODO:/i.test(l) })
  }

  function isEmptyMap(v) {
    return !v || typeof v !== 'object' || Array.isArray(v) || Object.keys(v).length === 0
  }

  function renderInline(s) {
    return esc(s)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`(.+?)`/g, '<code>$1</code>')
  }

  function renderMarkdown(text) {
    var lines = text.split('\n')
    var html = ''
    var inList = false
    for (var i = 0; i < lines.length; i++) {
      var line = lines[i]
      if (/^\s*[-*]\s+/.test(line)) {
        if (!inList) { html += '<ul>'; inList = true }
        html += '<li>' + renderInline(line.replace(/^\s*[-*]\s+/, '')) + '</li>'
      } else {
        if (inList) { html += '</ul>'; inList = false }
        if (line.trim()) html += '<p>' + renderInline(line) + '</p>'
      }
    }
    if (inList) html += '</ul>'
    return html
  }

  var fontLoaded = {}
  function loadGoogleFont(name) {
    if (!name || fontLoaded[name]) return
    fontLoaded[name] = true
    var link = document.createElement('link')
    link.rel = 'stylesheet'
    link.href = 'https://fonts.googleapis.com/css2?family=' + encodeURIComponent(name).replace(/%20/g, '+') + ':ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap'
    document.head.appendChild(link)
  }

  function resolveRef(val, tokens) {
    if (typeof val !== 'string') return val
    var m = val.match(/^\{([a-z]+)\.([A-Za-z0-9_-]+)\}$/)
    if (!m) return val
    var bucket = tokens[m[1]]
    if (!bucket || typeof bucket !== 'object') return val
    if (!(m[2] in bucket)) return val
    return bucket[m[2]]
  }

  function parseDim(v) {
    if (typeof v === 'number') return { value: v, unit: 'px', css: v + 'px' }
    if (typeof v !== 'string') return null
    var m = v.match(/^(-?\d*\.?\d+)\s*(px|em|rem|%)?$/)
    if (!m) return null
    var num = parseFloat(m[1])
    var unit = m[2] || 'px'
    return { value: num, unit: unit, css: num + unit }
  }

  function dimPx(dim) {
    if (!dim) return 0
    if (dim.unit === 'px') return dim.value
    if (dim.unit === 'em' || dim.unit === 'rem') return dim.value * 16
    return dim.value
  }

  function renderLede(tokens) {
    var name = tokens && typeof tokens.name === 'string' ? tokens.name.trim() : ''
    var desc = tokens && typeof tokens.description === 'string' ? tokens.description.trim() : ''
    var showName = name && !/^TODO/i.test(name)
    var showDesc = desc && !/^TODO/i.test(desc)
    if (!showName && !showDesc) return ''
    return '<div class="lede">' +
      (showName ? '<div class="lede-name">' + esc(name) + '</div>' : '') +
      (showDesc ? '<div class="lede-desc">' + esc(desc) + '</div>' : '') +
      '</div>'
  }

  function renderColors(colors) {
    var keys = Object.keys(colors)
    if (!keys.length) return ''
    var html = keys.map(function (k) {
      var v = colors[k]
      if (typeof v !== 'string') return ''
      return '<div class="swatch" style="background:' + esc(v) + '">' +
        '<span class="swatch-label">' + esc(k) + '</span>' +
        '<span class="swatch-value">' + esc(v) + '</span>' +
        '</div>'
    }).join('')
    return '<div class="swatches">' + html + '</div>'
  }

  function renderTypography(typography) {
    var keys = Object.keys(typography)
    if (!keys.length) return ''
    return keys.map(function (k) {
      var t = typography[k] || {}
      if (typeof t !== 'object') return ''
      var family = typeof t.fontFamily === 'string' ? t.fontFamily : ''
      var size = typeof t.fontSize === 'string' || typeof t.fontSize === 'number' ? t.fontSize : '28px'
      var weight = t.fontWeight != null ? t.fontWeight : 400
      var lh = t.lineHeight != null ? t.lineHeight : 1.1
      var ls = t.letterSpacing != null ? t.letterSpacing : '0'
      if (family) loadGoogleFont(family)
      var style = [
        family ? "font-family: '" + String(family).replace(/'/g, "\\'") + "', serif" : '',
        'font-size: ' + (typeof size === 'number' ? size + 'px' : size),
        'font-weight: ' + weight,
        'line-height: ' + lh,
        'letter-spacing: ' + ls,
      ].filter(Boolean).join(';')
      var alphaStyle = [
        family ? "font-family: '" + String(family).replace(/'/g, "\\'") + "', serif" : '',
        'font-weight: ' + weight,
      ].filter(Boolean).join(';')
      return (
        '<div class="font-specimen">' +
          '<div class="font-name">' +
            '<span>' + esc(k) + (family ? ' &middot; ' + esc(family) : '') + '</span>' +
            '<span>' + esc(String(weight)) + '</span>' +
          '</div>' +
          '<div class="font-sample-lg" style="' + style + '">The quick brown fox jumps over the lazy dog</div>' +
          '<div class="font-sample-md" style="' + style + '">Regular body text sample.</div>' +
          '<div class="font-alpha" style="' + alphaStyle + '">Abcdefghijklmnopqrstuvwxyz &middot; 0123456789</div>' +
        '</div>'
      )
    }).join('')
  }

  function renderSpacing(spacing) {
    var keys = Object.keys(spacing)
    if (!keys.length) return ''
    var dims = keys.map(function (k) { return { k: k, dim: parseDim(spacing[k]) } })
      .filter(function (x) { return x.dim })
    if (!dims.length) return ''
    var maxPx = dims.reduce(function (m, x) { return Math.max(m, dimPx(x.dim)) }, 1)
    var html = dims.map(function (x) {
      var pct = Math.max(2, (dimPx(x.dim) / maxPx) * 100)
      return '<div class="scale-bar">' +
        '<span class="scale-bar-name">' + esc(x.k) + '</span>' +
        '<span class="scale-bar-fill" style="width:' + pct + '%"></span>' +
        '<span class="scale-bar-value">' + esc(x.dim.css) + '</span>' +
        '</div>'
    }).join('')
    return '<div class="scale-bars">' + html + '</div>'
  }

  function renderRounded(rounded) {
    var keys = Object.keys(rounded)
    if (!keys.length) return ''
    var items = keys.map(function (k) {
      var dim = parseDim(rounded[k])
      var radius = dim ? dim.css : String(rounded[k])
      var displayRadius = radius
      if (dim && dim.value > 36) displayRadius = '50%'
      return '<div class="shape-chip">' +
        '<div class="shape-box" style="border-radius:' + esc(displayRadius) + '"></div>' +
        '<div class="shape-meta"><strong>' + esc(k) + '</strong>' + esc(radius) + '</div>' +
        '</div>'
    }).join('')
    return '<div class="shape-row">' + items + '</div>'
  }

  function renderComponents(components, tokens) {
    var keys = Object.keys(components)
    if (!keys.length) return ''
    var items = keys.map(function (k) {
      var c = components[k] || {}
      if (typeof c !== 'object') return ''
      var bg = resolveRef(c.backgroundColor, tokens)
      var fg = resolveRef(c.textColor, tokens)
      var typo = resolveRef(c.typography, tokens)
      var rounded = resolveRef(c.rounded, tokens)
      var roundedDim = parseDim(rounded)
      var padding = c.padding != null ? String(c.padding) : '12px 20px'
      var styles = []
      if (typeof bg === 'string') styles.push('background:' + bg)
      if (typeof fg === 'string') styles.push('color:' + fg)
      styles.push('padding:' + padding)
      if (roundedDim) styles.push('border-radius:' + roundedDim.css)
      else if (typeof rounded === 'string') styles.push('border-radius:' + rounded)
      if (typo && typeof typo === 'object') {
        if (typeof typo.fontFamily === 'string') {
          loadGoogleFont(typo.fontFamily)
          styles.push("font-family:'" + String(typo.fontFamily).replace(/'/g, "\\'") + "', sans-serif")
        }
        if (typo.fontSize != null) styles.push('font-size:' + (typeof typo.fontSize === 'number' ? typo.fontSize + 'px' : typo.fontSize))
        if (typo.fontWeight != null) styles.push('font-weight:' + typo.fontWeight)
        if (typo.lineHeight != null) styles.push('line-height:' + typo.lineHeight)
        if (typo.letterSpacing != null) styles.push('letter-spacing:' + typo.letterSpacing)
      }
      return '<div class="component-card">' +
        '<div class="component-name">' + esc(k) + '</div>' +
        '<div class="component-preview" style="' + styles.join(';') + '">' + esc(k.replace(/-/g, ' ')) + '</div>' +
        '</div>'
    }).join('')
    return '<div class="component-grid">' + items + '</div>'
  }

  var SECTION_RENDERERS = {
    'overview': function (tokens) { return renderLede(tokens) },
    'colors': function (tokens) {
      var c = tokens.colors
      return (c && typeof c === 'object' && !Array.isArray(c)) ? renderColors(c) : ''
    },
    'typography': function (tokens) {
      var t = tokens.typography
      return (t && typeof t === 'object' && !Array.isArray(t)) ? renderTypography(t) : ''
    },
    'layout': function (tokens) {
      var s = tokens.spacing
      return (s && typeof s === 'object' && !Array.isArray(s)) ? renderSpacing(s) : ''
    },
    'shapes': function (tokens) {
      var r = tokens.rounded
      return (r && typeof r === 'object' && !Array.isArray(r)) ? renderRounded(r) : ''
    },
    'components': function (tokens) {
      var c = tokens.components
      return (c && typeof c === 'object' && !Array.isArray(c)) ? renderComponents(c, tokens) : ''
    },
  }

  var TOKEN_SOURCE_FOR = {
    'colors': 'colors',
    'typography': 'typography',
    'layout': 'spacing',
    'shapes': 'rounded',
    'components': 'components',
  }

  function renderSection(title, body, extras, idx, todo) {
    var inner = ''
    if (extras) inner += extras
    if (!todo) inner += '<div class="prose">' + renderMarkdown(body) + '</div>'
    if (!inner) inner = '<div class="todo">Not yet defined</div>'
    var idxStr = String(idx + 1).padStart(2, '0')
    return '<section>' +
      '<h2><span>' + esc(title) + '</span><span class="idx">' + idxStr + '</span></h2>' +
      inner +
      '</section>'
  }

  function canonicalSections(sections) {
    var byKey = {}
    for (var i = 0; i < sections.length; i++) {
      var key = normalizeTitle(sections[i].title)
      if (!byKey[key]) byKey[key] = sections[i]
    }
    return byKey
  }

  function renderCanonical(design) {
    var tokens = design.tokens || {}
    var byKey = canonicalSections(design.sections || [])
    var html = ''
    for (var i = 0; i < CANONICAL_ORDER.length; i++) {
      var key = CANONICAL_ORDER[i]
      var section = byKey[key]
      var title = section ? section.title : titleCase(key)
      var body = section ? section.body : ''
      var proseTodo = isTodo(body)
      var tokenKey = TOKEN_SOURCE_FOR[key]
      var tokenEmpty = !tokenKey || isEmptyMap(tokens[tokenKey])
      var renderer = SECTION_RENDERERS[key]
      var extras = renderer ? renderer(tokens) : ''
      var todo = proseTodo && tokenEmpty && !extras
      html += renderSection(title, body, extras, i, todo)
    }
    return html
  }

  function titleCase(s) {
    return s.replace(/(^|[\s&'])\w/g, function (m) { return m.toUpperCase() })
  }

  function renderFeel(feel, startIdx) {
    if (!feel || !feel.sections || !feel.sections.length) return ''
    var html = '<div class="feel-divider">' +
      '<div><div class="eyebrow">Feel</div><h2>Motion · Space · Atmosphere</h2></div>' +
      '<div class="eyebrow">From FEEL.md</div>' +
      '</div>'
    for (var i = 0; i < feel.sections.length; i++) {
      var s = feel.sections[i]
      var todo = isTodo(s.body)
      html += renderSection(s.title, s.body, '', startIdx + i, todo)
    }
    return html
  }

  function renderAll(data) {
    var parts = []
    if (data.parseError) {
      parts.push('<div class="parse-error">Could not parse DESIGN.md front-matter: ' + esc(data.parseError) + '. Showing prose only.</div>')
    }
    parts.push(renderCanonical(data.design || { tokens: {}, sections: [] }))
    parts.push(renderFeel(data.feel, CANONICAL_ORDER.length))
    contentEl.innerHTML = parts.join('')
  }

  async function load() {
    try {
      var res = await fetch('/api/projects/' + encodeURIComponent(projectId) + '/design', { cache: 'no-store' })
      if (!res.ok) throw new Error('HTTP ' + res.status)
      var data = await res.json()
      renderAll(data)
      var now = new Date()
      updatedEl.textContent = 'Updated ' + now.toLocaleTimeString()
    } catch (e) {
      contentEl.innerHTML = '<div class="empty">Could not load design (' + esc(String(e.message || e)) + ')</div>'
    }
  }

  load()

  try {
    var es = new EventSource('/api/projects/' + encodeURIComponent(projectId) + '/events')
    es.addEventListener('design-changed', load)
  } catch (e) {
    // SSE unavailable — manual refresh via the title bar still works.
  }
})()
</script>
</body>
</html>
